name: Run Trading Bot

on:
  schedule:
    - cron: '45 13 * * 1-5'  # 6:45 AM Fresno time, Monday–Friday only
  workflow_dispatch:           # Also lets you trigger it manually anytime

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python Trade_Run_3_Scaler.py
